{% extends "base.html" %}
{% block page_title %}{{ title }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">{{ title }}</h2>
    <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Finished Product</label>
            {{ form.product }}
            <p class="text-xs text-gray-400 mt-1">Select the item you want to build.</p>
        </div>
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Quantity to Produce</label>
            {{ form.quantity }}
            <p class="text-xs text-gray-400 mt-1">How many units does this recipe make?</p>
        </div>
        <div class="pt-4 border-t border-gray-100">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-sm transition">
                Save Recipe Header
            </button>
        </div>
    </form>
</div>
{% endblock %}
