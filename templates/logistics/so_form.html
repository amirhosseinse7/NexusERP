{% extends "base.html" %}
{% block page_title %}New Quotation{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h3 class="font-bold text-gray-800 mb-6 border-b pb-2">Customer Details</h3>
    <form method="post" class="space-y-6">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Customer</label>
            {{ form.customer }}
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Delivery Mode</label>
            {{ form.delivery_mode }}
        </div>
        <div class="flex justify-end pt-4">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-medium hover:bg-blue-700">Start Quote</button>
        </div>
    </form>
</div>
{% endblock %}
