{% extends "base.html" %}

{% block page_title %}New Purchase Order{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white rounded-xl shadow-sm border border-gray-100 p-6">
    <h3 class="text-lg font-bold text-gray-800 mb-6 border-b pb-2">Select Supplier</h3>
    
    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Supplier</label>
            {{ form.supplier }}
            <p class="text-xs text-gray-500 mt-1">Select the vendor you are buying from.</p>
        </div>

        <div class="flex justify-end space-x-3 pt-4">
            <a href="{% url 'po_list' %}" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 bg-white">
                Cancel
            </a>
            <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-sm font-medium">
                Create Draft
            </button>
        </div>
    </form>
</div>
{% endblock %}
