<div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 flex items-start justify-between hover:shadow-md transition">
    <div>
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide">{{ title }}</p>
        <h3 class="mt-2 text-2xl font-bold text-gray-900">{{ value }}</h3>
        {% if subtext %}
        <p class="mt-1 text-sm {{ color_class|default:'text-gray-400' }}">
            {{ subtext }}
        </p>
        {% endif %}
    </div>
    <div class="p-3 rounded-lg {{ bg_class|default:'bg-blue-50' }}">
        <i class="{{ icon }} {{ icon_color|default:'text-blue-600' }} text-xl"></i>
    </div>
</div>
