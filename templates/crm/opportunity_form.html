{% extends "base.html" %}

{% block page_title %}New Opportunity{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Log New Lead</h2>
    
    <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Opportunity Title</label>
            {{ form.title }}
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Customer</label>
            {{ form.customer }}
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Expected Revenue ($)</label>
                {{ form.expected_revenue }}
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Probability (%)</label>
                {{ form.probability }}
            </div>
        </div>

        <div class="pt-4 border-t border-gray-100">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-sm transition">
                Create Opportunity
            </button>
        </div>
    </form>
</div>
{% endblock %}
