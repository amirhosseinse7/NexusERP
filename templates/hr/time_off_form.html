{% extends "base.html" %}
{% block page_title %}Request Time Off{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-100">
    <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Submit Leave Request</h2>
    
    <form method="post" class="space-y-5">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Employee</label>
                {{ form.employee }}
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Leave Type</label>
                {{ form.leave_type }}
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">Start Date</label>
                {{ form.start_date }}
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-1">End Date</label>
                {{ form.end_date }}
            </div>
        </div>

        <div>
            <label class="block text-sm font-bold text-gray-700 mb-1">Reason / Notes (Optional)</label>
            {{ form.reason }}
        </div>
        
        <div class="pt-4 border-t border-gray-100">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-sm transition">
                Submit for Approval
            </button>
        </div>
    </form>
</div>
{% endblock %}
